name: Deploy to Hugging Face Space

# GitHub is the source of truth: every push to main is mirrored to the HF Space
# git repo, which triggers a rebuild. The push targets huggingface.co (not
# GitHub), so it never re-triggers this workflow.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-space
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to the Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "token length: ${#HF_TOKEN}"
          git -c http.extraheader="Authorization: Bearer ${HF_TOKEN}" \
            push --force \
            "https://huggingface.co/spaces/tfrere/met-office-isobars" \
            HEAD:main
